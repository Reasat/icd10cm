id: https://w3id.org/monarch-initiative/mondo-source-schema
name: mondo_source_schema
description: >-
  Minimal LinkML schema for a Mondo-ready ontology source.
  Captures only the elements Mondo uses: labels, definitions, synonyms,
  and hierarchical parentage. Used to validate and export each source as
  a schema-conformant YAML + OWL artefact.
version: 0.1.0

prefixes:
  linkml:     https://w3id.org/linkml/
  mondo_src:  https://w3id.org/monarch-initiative/mondo-source-schema/
  rdfs:       http://www.w3.org/2000/01/rdf-schema#
  skos:       http://www.w3.org/2004/02/skos/core#
  dcterms:    http://purl.org/dc/terms/
  obo:        http://purl.obolibrary.org/obo/
  oboInOwl:   http://www.geneontology.org/formats/oboInOwl#
  owl:        http://www.w3.org/2002/07/owl#
  ICD10CM:    http://purl.bioontology.org/ontology/ICD10CM/

imports:
  - linkml:types

default_prefix: mondo_src
default_range: string


# ── Classes ──────────────────────────────────────────────────────────────────

classes:

  OntologyDocument:
    description: >-
      Top-level container representing a single ontology source release.
    tree_root: true
    class_uri: owl:Ontology
    slots:
      - title
      - version
      - terms

  OntologyTerm:
    description: >-
      A single class / concept from the source ontology, containing only
      the elements Mondo requires for ingest.
    class_uri: owl:Class
    slots:
      - id
      - label
      - definition
      - exact_synonyms
      - related_synonyms
      - narrow_synonyms
      - broad_synonyms
      - close_synonyms
      - parents
      - is_root
      - deprecated


# ── Slots ────────────────────────────────────────────────────────────────────

slots:

  # -- Document-level metadata --

  title:
    description: Human-readable title of the ontology source.
    slot_uri: dcterms:title
    required: true

  version:
    description: Version string for this release (e.g. "2024ab" or "2025-03-01").
    slot_uri: owl:versionInfo
    required: true

  terms:
    description: All terms included in this source release.
    range: OntologyTerm
    multivalued: true
    inlined_as_list: true
    required: true

  # -- Term identity --

  id:
    description: >-
      Canonical CURIE identifier for the term (e.g. "ICD10CM:A00").
    identifier: true
    slot_uri: dcterms:identifier
    range: uriorcurie
    required: true

  # -- Core annotation properties --

  label:
    description: The preferred human-readable label.
    slot_uri: rdfs:label
    required: true
    annotations:
      owl: AnnotationAssertion

  definition:
    description: Textual definition (IAO:0000115).
    slot_uri: obo:IAO_0000115
    recommended: true
    annotations:
      owl: AnnotationAssertion

  # -- Synonyms --

  exact_synonyms:
    description: Exact-match synonyms (oboInOwl:hasExactSynonym).
    slot_uri: oboInOwl:hasExactSynonym
    multivalued: true
    recommended: true
    annotations:
      owl: AnnotationAssertion

  related_synonyms:
    description: Related synonyms (oboInOwl:hasRelatedSynonym).
    slot_uri: oboInOwl:hasRelatedSynonym
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  narrow_synonyms:
    description: Narrower synonyms (oboInOwl:hasNarrowSynonym).
    slot_uri: oboInOwl:hasNarrowSynonym
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  broad_synonyms:
    description: Broader synonyms (oboInOwl:hasBroadSynonym).
    slot_uri: oboInOwl:hasBroadSynonym
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  close_synonyms:
    description: >-
      Close synonyms (skos:closeMatch). oboInOwl has no dedicated close-synonym
      property, so skos:closeMatch is used as the nearest equivalent.
    slot_uri: skos:closeMatch
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  # -- Hierarchy --

  parents:
    description: >-
      Direct is-a parents. Required unless is_root is true.
    slot_uri: rdfs:subClassOf
    range: OntologyTerm
    multivalued: true
    annotations:
      owl: SubClassOf

  is_root:
    description: >-
      True when this term has no named parents and sits at the top of
      the hierarchy. Relaxes the parents requirement.
    range: boolean
    ifabsent: "false"

  deprecated:
    description: True when this term is marked owl:deprecated.
    slot_uri: owl:deprecated
    range: boolean
    ifabsent: "false"
    annotations:
      owl: AnnotationAssertion
